<script>
const pi = 3.14;

const config = {
  "正方形": {
    types: ["面积"],
    inputs: ["边长"]
  },
  "长方形": {
    types: ["面积"],
    inputs: ["长", "宽"]
  },
  "平行四边形": {
    types: ["面积"],
    inputs: ["底", "高"]
  },
  "圆形": {
    types: ["周长", "面积"],
    inputs: ["半径"]
  },
  "正方体": {
    types: ["体积", "表面积"],
    inputs: ["棱长"]
  },
  "长方体": {
    types: ["体积", "表面积"],
    inputs: ["长", "宽", "高"]
  },
  "圆柱": {
    types: ["体积", "侧面积", "底面积"],
    inputs: ["半径", "高"]
  },
  "圆锥": {
    types: ["体积", "底面积"],
    inputs: ["半径", "高"]
  },
  "球": {
    types: ["体积", "表面积"],
    inputs: ["半径"]
  }
};

// ===== 图形变化时更新 =====
function updateUI() {
  let shape = document.getElementById("shape").value;
  let typeSelect = document.getElementById("type");

  // 清空类型
  typeSelect.innerHTML = "";

  config[shape].types.forEach(t => {
    let opt = document.createElement("option");
    opt.text = t;
    typeSelect.add(opt);
  });

  updateInputs();
}

// ===== 输入提示更新 =====
function updateInputs() {
  let shape = document.getElementById("shape").value;
  let inputs = config[shape].inputs;

  document.getElementById("a").placeholder = "请输入" + inputs[0];
  document.getElementById("b").style.display = inputs[1] ? "block" : "none";
  document.getElementById("c").style.display = inputs[2] ? "block" : "none";

  if (inputs[1]) document.getElementById("b").placeholder = "请输入" + inputs[1];
  if (inputs[2]) document.getElementById("c").placeholder = "请输入" + inputs[2];
}

// ===== 计算 =====
function calc() {
  let shape = document.getElementById("shape").value;
  let type = document.getElementById("type").value;

  let a = parseFloat(document.getElementById("a").value);
  let b = parseFloat(document.getElementById("b").value);
  let c = parseFloat(document.getElementById("c").value);

  if (isNaN(a)) return show("别搞");

  let res = "";

  switch(shape) {

    case "正方形":
      res = `${a}×${a}=${a*a}`;
      break;

    case "长方形":
      if (isNaN(b)) return show("别搞");
      res = `${a}×${b}=${a*b}`;
      break;

    case "平行四边形":
      if (isNaN(b)) return show("别搞");
      res = `${a}×${b}=${a*b}`;
      break;

    case "圆形":
      if (type === "周长")
        res = `2×3.14×${a}=${2*pi*a}`;
      else
        res = `3.14×${a}×${a}=${pi*a*a}`;
      break;

    case "正方体":
      if (type === "体积")
        res = `${a}×${a}×${a}=${a*a*a}`;
      else
        res = `6×${a}×${a}=${6*a*a}`;
      break;

    case "长方体":
      if (isNaN(b)||isNaN(c)) return show("别搞");
      if (type === "体积")
        res = `${a}×${b}×${c}=${a*b*c}`;
      else
        res = `2×(${a}×${b}+${a}×${c}+${b}×${c})=${2*(a*b+a*c+b*c)}`;
      break;

    case "圆柱":
      if (type === "底面积") {
        res = `${a}×${a}×3.14=${pi*a*a}`;
      } else {
        if (isNaN(b)) return show("别搞");
        if (type === "体积")
          res = `3.14×${a}×${a}×${b}=${pi*a*a*b}`;
        else
          res = `2×3.14×${a}×${b}=${2*pi*a*b}`;
      }
      break;

    case "圆锥":
      if (type === "底面积") {
        res = `${a}×${a}×3.14=${pi*a*a}`;
      } else {
        if (isNaN(b)) return show("别搞");
        res = `3.14×${a}×${a}×${b}÷3=${pi*a*a*b/3}`;
      }
      break;

    case "球":
      if (type === "体积")
        res = `4×3.14×${a}×${a}×${a}÷3=${4*pi*a*a*a/3}`;
      else
        res = `4×3.14×${a}×${a}=${4*pi*a*a}`;
      break;
  }

  show(res);
}

function show(t){
  document.getElementById("result").innerText = t;
}

// 初始化
window.onload = updateUI;
</script>
