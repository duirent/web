<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>еҮ дҪ•и®Ўз®—еҷЁ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f0f0f0;
}

.box {
  padding: 15px;
  background: white;
  margin: 10px;
  border-radius: 10px;
}

h2 {
  margin-top: 0;
}

select, input, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  font-size: 16px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
}

#result {
  margin-top: 10px;
  font-weight: bold;
  color: blue;
}
</style>
</head>

<body>

<div class="box">
  <h2>иЎЁйқўз§Ҝ/йқўз§Ҝ/дҪ“з§Ҝи®Ўз®—еҷЁ</h2>

  <select id="shape" onchange="updateUI()">
    <option>жӯЈж–№еҪў</option>
    <option>й•ҝж–№еҪў</option>
    <option>е№іиЎҢеӣӣиҫ№еҪў</option>
    <option>еңҶеҪў</option>
    <option>еңҶжҹұ</option>
    <option>еңҶй”Ҙ</option>
    <option>жӯЈж–№дҪ“</option>
    <option>й•ҝж–№дҪ“</option>
    <option>зҗғ</option>
  </select>

  <select id="type"></select>

  <input id="a">
  <input id="b">
  <input id="c">

  <button onclick="calc()">и®Ўз®—</button>

  <div id="result"></div>
</div>

<script>
const pi = 3.14;

const config = {
  "жӯЈж–№еҪў": { types:["йқўз§Ҝ"], inputs:["иҫ№й•ҝ"] },
  "й•ҝж–№еҪў": { types:["йқўз§Ҝ"], inputs:["й•ҝ","е®Ҫ"] },
  "е№іиЎҢеӣӣиҫ№еҪў": { types:["йқўз§Ҝ"], inputs:["еә•","й«ҳ"] },
  "еңҶеҪў": { types:["е‘Ёй•ҝ","йқўз§Ҝ"], inputs:["еҚҠеҫ„"] },
  "жӯЈж–№дҪ“": { types:["дҪ“з§Ҝ","иЎЁйқўз§Ҝ"], inputs:["жЈұй•ҝ"] },
  "й•ҝж–№дҪ“": { types:["дҪ“з§Ҝ","иЎЁйқўз§Ҝ"], inputs:["й•ҝ","е®Ҫ","й«ҳ"] },
  "еңҶжҹұ": { types:["дҪ“з§Ҝ","дҫ§йқўз§Ҝ","еә•йқўз§Ҝ"], inputs:["еҚҠеҫ„","й«ҳ"] },
  "еңҶй”Ҙ": { types:["дҪ“з§Ҝ","еә•йқўз§Ҝ"], inputs:["еҚҠеҫ„","й«ҳ"] },
  "зҗғ": { types:["дҪ“з§Ҝ","иЎЁйқўз§Ҝ"], inputs:["еҚҠеҫ„"] }
};

function updateUI(){
  let shape = document.getElementById("shape").value;
  let type = document.getElementById("type");

  type.innerHTML = "";

  config[shape].types.forEach(t=>{
    let op = document.createElement("option");
    op.text = t;
    type.add(op);
  });

  updateInputs();
}

function updateInputs(){
  let shape = document.getElementById("shape").value;
  let inp = config[shape].inputs;

  let a = document.getElementById("a");
  let b = document.getElementById("b");
  let c = document.getElementById("c");

  a.placeholder = "иҜ·иҫ“е…Ҙ" + inp[0];

  if(inp[1]){
    b.style.display="block";
    b.placeholder="иҜ·иҫ“е…Ҙ"+inp[1];
  }else b.style.display="none";

  if(inp[2]){
    c.style.display="block";
    c.placeholder="иҜ·иҫ“е…Ҙ"+inp[2];
  }else c.style.display="none";
}

function calc(){
  let shape = document.getElementById("shape").value;
  let type = document.getElementById("type").value;

  let a = parseFloat(document.getElementById("a").value);
  let b = parseFloat(document.getElementById("b").value);
  let c = parseFloat(document.getElementById("c").value);

  if(isNaN(a)) return show("еҲ«жҗһ");

  let res="";

  switch(shape){

    case "жӯЈж–№еҪў":
      res=`${a}Г—${a}=${a*a}`;
      break;

    case "й•ҝж–№еҪў":
      if(isNaN(b)) return show("еҲ«жҗһ");
      res=`${a}Г—${b}=${a*b}`;
      break;

    case "е№іиЎҢеӣӣиҫ№еҪў":
      if(isNaN(b)) return show("еҲ«жҗһ");
      res=`${a}Г—${b}=${a*b}`;
      break;

    case "еңҶеҪў":
      if(type==="е‘Ёй•ҝ")
        res=`2Г—3.14Г—${a}=${2*pi*a}`;
      else
        res=`3.14Г—${a}Г—${a}=${pi*a*a}`;
      break;

    case "жӯЈж–№дҪ“":
      if(type==="дҪ“з§Ҝ")
        res=`${a}Г—${a}Г—${a}=${a*a*a}`;
      else
        res=`6Г—${a}Г—${a}=${6*a*a}`;
      break;

    case "й•ҝж–№дҪ“":
      if(isNaN(b)||isNaN(c)) return show("еҲ«жҗһ");
      if(type==="дҪ“з§Ҝ")
        res=`${a}Г—${b}Г—${c}=${a*b*c}`;
      else
        res=`2Г—(${a}Г—${b}+${a}Г—${c}+${b}Г—${c})=${2*(a*b+a*c+b*c)}`;
      break;

    case "еңҶжҹұ":
      if(type==="еә•йқўз§Ҝ"){
        res=`${a}Г—${a}Г—3.14=${pi*a*a}`;
      }else{
        if(isNaN(b)) return show("еҲ«жҗһ");
        if(type==="дҪ“з§Ҝ")
          res=`3.14Г—${a}Г—${a}Г—${b}=${pi*a*a*b}`;
        else
          res=`2Г—3.14Г—${a}Г—${b}=${2*pi*a*b}`;
      }
      break;

    case "еңҶй”Ҙ":
      if(type==="еә•йқўз§Ҝ"){
        res=`${a}Г—${a}Г—3.14=${pi*a*a}`;
      }else{
        if(isNaN(b)) return show("еҲ«жҗһ");
        res=`3.14Г—${a}Г—${a}Г—${b}Г·3=${pi*a*a*b/3}`;
      }
      break;

    case "зҗғ":
      if(type==="дҪ“з§Ҝ")
        res=`4Г—3.14Г—${a}Г—${a}Г—${a}Г·3=${4*pi*a*a*a/3}`;
      else
        res=`4Г—3.14Г—${a}Г—${a}=${4*pi*a*a}`;
      break;
  }

  show(res);
}

function show(t){
  document.getElementById("result").innerText=t;
}

window.onload = function(){
  updateUI();
};
</script>

</body>
</html>
